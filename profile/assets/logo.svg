<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Operational Ecology">
  <!-- chartroom plate -->
  <circle cx="128" cy="128" r="120" fill="#0b2540"/>
  <circle cx="128" cy="128" r="120" stroke="#cfd6da" stroke-width="1.5" opacity="0.35"/>
  <!-- North Star (Polaris): four-point compass-star outline + bright centre -->
  <path d="M 128 56 L 134 74 L 152 80 L 134 86 L 128 104 L 122 86 L 104 80 L 122 74 Z"
        stroke="#cfd6da" stroke-width="2"/>
  <circle cx="128" cy="80" r="2.5" fill="#cfd6da"/>
  <!-- horizon -->
  <line x1="44" y1="138" x2="212" y2="138" stroke="#cfd6da" stroke-width="3"/>
  <!-- azimuth tick on the horizon, directly under the star — the bearing we navigate by -->
  <line x1="128" y1="132" x2="128" y2="146" stroke="#cfd6da" stroke-width="3"/>
  <!-- sea -->
  <path d="M 48 168 Q 76 158 104 168 T 160 168 T 212 168" stroke="#cfd6da" stroke-width="2.5"/>
  <path d="M 56 192 Q 86 182 116 192 T 168 192 T 208 192" stroke="#cfd6da" stroke-width="2" opacity="0.75"/>
</svg>
